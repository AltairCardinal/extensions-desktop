// JVM replacement for common.gradle in extensions-source.
// Compiles each extension as a self-contained fat JAR for Mihon Desktop.

apply plugin: 'org.jetbrains.kotlin.jvm'

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_11
        freeCompilerArgs.add("-opt-in=kotlinx.serialization.ExperimentalSerializationApi")
        freeCompilerArgs.add("-Xcontext-parameters")
    }
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

// Some extensions hook Android lifecycle tasks such as preBuild/assembleRelease.
// Provide no-op JVM equivalents so those modules still configure successfully.
['preBuild', 'assembleDebug', 'assembleRelease'].each { taskName ->
    if (tasks.findByName(taskName) == null) {
        tasks.register(taskName)
    }
}

// ─── Extension metadata ───────────────────────────────────────────────────────
def versionCode    = project.ext.find("extVersionCode") ?: 1
def versionName    = "1.4.${versionCode}"
def langDir        = project.parent.name          // e.g. "en"
def extDir         = project.name                 // e.g. "mangadex"
def pkgSuffix      = "${langDir}.${extDir}"
def pkgName        = "eu.kanade.tachiyomi.extension.${pkgSuffix}"
def extClassSuffix = (project.ext.find("extClass") ?: ".${extDir.capitalize()}").toString()
def extClassName   = "${pkgName}${extClassSuffix}"

Project theme = ext.has("themePkg") ? project(":lib-multisrc:${ext.themePkg}") : null
if (theme != null) evaluationDependsOn(theme.path)

// ─── Source sets ──────────────────────────────────────────────────────────────
sourceSets {
    main {
        kotlin { srcDirs = ['src'] }
        resources { srcDirs = ['res', 'assets'] }
    }
}

// ─── Dependencies ─────────────────────────────────────────────────────────────
dependencies {
    if (theme != null) implementation(theme)
    implementation(project(":core"))
    implementation(project(":android-compat"))
    implementation(project(":desktop-api"))
    compileOnly(libs.kotlin.stdlib)
    compileOnly(libs.coroutines.core)
    compileOnly(libs.rxjava)
    compileOnly(libs.kotlin.protobuf)
    compileOnly(libs.kotlin.json)
    compileOnly(libs.jsoup)
    compileOnly(libs.okhttp)
}

// ─── Fat JAR (includes local project outputs only; shared libraries stay compileOnly) ─
jar {
    archiveFileName = "${pkgName}-v${versionName}.jar"
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from {
        configurations.runtimeClasspath.collect { f ->
            f.isDirectory() ? f : zipTree(f)
        }
    }
    exclude('META-INF/MANIFEST.MF', 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA', 'META-INF/versions/**')

    // ServiceLoader registration so DesktopExtensionLoader finds the source
    doFirst {
        def svcDir = new File(temporaryDir, 'META-INF/services')
        svcDir.mkdirs()
        new File(svcDir, 'eu.kanade.tachiyomi.source.Source').text = "${extClassName}\n"
    }
    from(temporaryDir)
}
