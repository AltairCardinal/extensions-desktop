name: Build JVM Extensions

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday 03:00 UTC
  workflow_dispatch:        # Allow manual trigger
  push:
    branches: [main]
    paths:
      - 'android-compat/**'
      - 'patches/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout extensions-desktop
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone extensions-source
        run: |
          git clone --depth=1 https://github.com/keiyoushi/extensions-source.git extensions-source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Apply JVM patches
        run: |
          chmod +x scripts/patch.sh
          scripts/patch.sh

      - name: Build JVM extensions
        run: |
          chmod +x scripts/build-extensions.sh
          scripts/build-extensions.sh

      - name: Prepare publish tree
        run: |
          mkdir -p repo/apk
          cp out/index.min.json repo/index.min.json
          cp out/apk/*.jar repo/apk/
          if [ -f out/failed_modules.txt ]; then
            cp out/failed_modules.txt repo/failed_modules.txt
          fi

      - name: Commit and push to repo branch
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Orphan repo branch (index + JARs only, no source history)
          git fetch origin repo 2>/dev/null || true
          git checkout --orphan repo-new

          # Keep only repo/ contents
          git rm -rf --cached . > /dev/null 2>&1 || true
          find . -maxdepth 1 -not -name 'repo' -not -name '.git' -not -name '.' | xargs rm -rf

          mv repo/* .
          rmdir repo

          git add index.min.json apk/
          if [ -f failed_modules.txt ]; then
            git add failed_modules.txt
          fi

          COUNT=$(find apk -name "*.jar" | wc -l | tr -d ' ')
          FAIL_COUNT=$(wc -l < failed_modules.txt 2>/dev/null | tr -d ' ' || echo 0)
          git commit -m "chore: update extensions (${COUNT} JARs, ${FAIL_COUNT} failed) $(date -u +%Y-%m-%d)"

          # Force-push to repo branch
          git push origin repo-new:repo --force

      - name: Summary
        run: |
          COUNT=$(find out/apk -name "*.jar" 2>/dev/null | wc -l || echo 0)
          FAIL_COUNT=$(wc -l < out/failed_modules.txt 2>/dev/null | tr -d ' ' || echo 0)
          echo "### Build complete" >> $GITHUB_STEP_SUMMARY
          echo "**Extensions built:** ${COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "**Extensions failed:** ${FAIL_COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "**Repo branch updated** with \`index.min.json\` + JARs" >> $GITHUB_STEP_SUMMARY
          if [ -f out/failed_modules.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "First failed modules:" >> $GITHUB_STEP_SUMMARY
            head -20 out/failed_modules.txt | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Add this URL to Mihon Desktop:" >> $GITHUB_STEP_SUMMARY
          echo "\`https://raw.githubusercontent.com/${{ github.repository }}/repo\`" >> $GITHUB_STEP_SUMMARY
